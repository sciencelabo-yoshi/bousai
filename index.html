<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>避難判断システム</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f2f4f7;}
header{background:#c62828;color:#fff;padding:15px;text-align:center;}
.page{display:none;padding:20px;}
.active{display:block;}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:15px;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#1976d2;color:white;}
textarea,input,select{width:100%;margin-top:10px;padding:10px;}
#map{height:300px;margin-top:10px;}
.warning{background:#fff3cd;padding:10px;margin-bottom:10px;}
.hazard{background:#ffebee;padding:10px;margin-top:10px;}
</style>
</head>

<body>

<header>
<h2>避難判断・安否確認システム</h2>
</header>

<div class="warning">
※このシステムは訓練用です。実際の災害では必ず公式情報を優先してください。
</div>

<!-- ページ1 -->
<div id="p1" class="page active">
<div class="card">
<h3>開始</h3>
<button onclick="next(2)">開始する</button>
</div>
</div>

<!-- ページ2 -->
<div id="p2" class="page">
<div class="card">
<h3>安否確認</h3>

<input id="name" placeholder="名前">

<select id="condition">
<option value="">状態</option>
<option>無事</option>
<option>けが</option>
<option>動けない</option>
</select>

<button onclick="next(3)">次へ</button>
</div>
</div>

<!-- ページ3 -->
<div id="p3" class="page">
<div class="card">
<h3>現在地</h3>

<div class="hazard">
⚠ 地図は参考情報です。唯一の判断材料にしないこと
</div>

<div id="map"></div>

<button onclick="next(4)">次へ</button>
</div>
</div>

<!-- ページ4 -->
<div id="p4" class="page">
<div class="card">
<h3>周囲の様子</h3>

<textarea id="situation" placeholder="周囲の様子"></textarea>

<input type="file" id="img">

<button onclick="next(5)">次へ</button>
</div>
</div>

<!-- ページ5 -->
<div id="p5" class="page">
<div class="card">
<h3>SNS情報</h3>

<p>「橋は安全らしい」</p>

<select id="sns">
<option value="">どう判断する？</option>
<option>信じる</option>
<option>疑う</option>
<option>照合する</option>
</select>

<button onclick="next(6)">次へ</button>
</div>
</div>

<!-- ページ6 -->
<div id="p6" class="page">
<div class="card">
<h3>行動選択</h3>

<select id="action">
<option value="">選択</option>
<option>その場待機</option>
<option>公園へ</option>
<option>帰宅</option>
<option>学校へ</option>
</select>

<button onclick="next(7)">次へ</button>
</div>
</div>

<!-- ページ7 -->
<div id="p7" class="page">
<div class="card">
<h3>理由</h3>

<textarea id="reason"></textarea>

<button onclick="makePrompt()">AI評価用プロンプト作成</button>
</div>
</div>

<!-- ページ8 -->
<div id="p8" class="page">
<div class="card">
<h3>AI評価</h3>

<div class="hazard">
① 下のプロンプトをコピー<br>
② 下のリンクを開く<br>
③ 「AIに聞こう」に貼り付け
</div>

<a href="https://edu-ai.jp/sukuten/login.htm" target="_blank">
▶ スクールAIを開く
</a>

<textarea id="prompt"></textarea>

<button onclick="copyPrompt()">コピー</button>

</div>
</div>

<script>
let map,marker,lat,lng;

function next(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

if(n==3)initMap();
}

function initMap(){
if(map)return;

map=L.map('map').setView([34.6851,135.8048],15);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

map.on("click",e=>{
lat=e.latlng.lat;
lng=e.latlng.lng;

if(marker)marker.setLatLng(e.latlng);
else marker=L.marker(e.latlng).addTo(map);
});
}

function makePrompt(){

const text=`
あなたは防災教育の専門家です。

以下は生徒の避難行動記録です。

【情報】
名前：${name.value}
状態：${condition.value}
位置：${lat},${lng}
周囲：${situation.value}
SNS判断：${sns.value}
行動：${action.value}
理由：${reason.value}

【評価観点】
1 安全確保
2 危険認識
3 情報判断
4 再判断
5 妥当性

【出力】
・総合評価
・良い点
・改善点
`;

document.getElementById("prompt").value=text;
next(8);
}

function copyPrompt(){
navigator.clipboard.writeText(prompt.value);
alert("コピーしました");
}
</script>

</body>
</html>
